name: Build PRMS APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        run: |
          git clone --depth 1 --branch 3.22.2 \
            https://github.com/flutter/flutter.git $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Flutter pub get
        run: |
          export PATH="$HOME/flutter/bin:$PATH"
          flutter pub get

      - name: Build APK
        run: |
          export PATH="$HOME/flutter/bin:$PATH"
          cd android && chmod +x gradlew && cd ..
          flutter build apk --debug \
            --dart-define=FLUTTER_BUILD_MODE=debug
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m -Dkotlin.incremental=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PRMS-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
