name: Build PRMS APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'

      - name: Setup Android project
        run: |
          cp -r lib /tmp/lib_backup
          cp pubspec.yaml /tmp/pubspec_backup.yaml
          cp -r assets /tmp/assets_backup 2>/dev/null || true
          flutter create --org com.genusit --project-name prms_app .
          cp -r /tmp/lib_backup/* lib/
          cp /tmp/pubspec_backup.yaml pubspec.yaml
          cp -r /tmp/assets_backup/* assets/ 2>/dev/null || true

          # Fix app build.gradle
          cat > android/app/build.gradle << 'GRADLE'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "com.genusit.prms"
              compileSdk 34
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
              defaultConfig {
                  applicationId "com.genusit.prms"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          flutter { source '../..' }
          GRADLE

          # Fix icon in manifest
          sed -i 's/android:roundIcon="@mipmap\/ic_launcher_round"//g' android/app/src/main/AndroidManifest.xml

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release APK (split per ABI = small size)
        run: |
          flutter build apk --release \
            --split-per-abi \
            --tree-shake-icons \
            --no-shrink
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m"

      - name: Upload ARM64 APK (~8MB, modern phones)
        uses: actions/upload-artifact@v4
        with:
          name: PRMS-arm64-v8a
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload ARM32 APK (older phones)
        uses: actions/upload-artifact@v4
        with:
          name: PRMS-armeabi-v7a
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30
